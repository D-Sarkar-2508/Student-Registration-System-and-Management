<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Student Login — DS Portal</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <style>
    .ac-wrap { position: relative; }
    .ac-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 999;
      background: #fff; border: 1.5px solid var(--primary);
      border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.13);
      max-height: 220px; overflow-y: auto; display: none;
    }
    .ac-dropdown.open { display: block; }
    .ac-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; cursor: pointer; transition: background .1s;
      border-bottom: 1px solid #f1f5f9;
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.active { background: var(--primary-l, #e0e7ff); }
    .ac-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--primary, #4f46e5); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 700; flex-shrink: 0;
    }
    .ac-email { font-size: .88rem; font-weight: 500; color: #1e293b; }
    .ac-name  { font-size: .75rem; color: #64748b; }
    .ac-arrow {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: #64748b; font-size: .8rem; padding: 4px;
    }
    .ac-arrow:hover { color: var(--primary, #4f46e5); }
  </style>
</head>
<body>
<div class="auth-outer" style="background:linear-gradient(135deg,#0f172a,#1e3a5f)">
  <div class="auth-card">
    <div class="auth-logo">👨‍🎓</div>
    <h1 class="auth-title">Student Login</h1>
    <p class="auth-sub">DS College of Engineering &amp; Technology</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat, msg in messages %}
        <div class="flash flash-{{ 'danger' if cat=='error' else cat }}" style="margin-bottom:14px">
          {{ msg }}<button class="flash-close" onclick="this.parentElement.remove()">×</button>
        </div>
      {% endfor %}{% endif %}
    {% endwith %}

    <form method="POST" id="studentLoginForm">

      <!-- Email with dropdown -->
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Email address</label>
        <div class="ac-wrap">
          <input type="email" name="email" id="emailInput" class="form-input"
                 placeholder="your@email.com" required autocomplete="off"
                 style="padding-right:36px"/>
          <button type="button" class="ac-arrow" id="emailArrow" title="Show all accounts">▼</button>
          <div class="ac-dropdown" id="emailDropdown"></div>
        </div>
      </div>

      <!-- Password with show/hide -->
      <div class="form-group" style="margin-bottom:6px">
        <label class="form-label">Password</label>
        <div style="position:relative">
          <input type="password" name="password" id="password" class="form-input"
                 placeholder="••••••••" required autocomplete="off"
                 style="padding-right:44px"/>
          <button type="button" onclick="togglePw()"
                  style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                         background:none;border:none;cursor:pointer;color:#64748b;font-size:1rem"
                  id="eyeBtn">👁</button>
        </div>
      </div>

      <!-- Remember me -->
      <div style="display:flex;align-items:center;gap:8px;margin:12px 0 20px">
        <input type="checkbox" id="rememberMe" style="width:16px;height:16px;accent-color:#4f46e5;cursor:pointer"/>
        <label for="rememberMe" style="font-size:.83rem;color:#64748b;cursor:pointer;user-select:none">
          Remember my email
        </label>
        <span id="savedBadge" style="display:none;margin-left:auto;font-size:.75rem;
              background:#e0f2fe;color:#0369a1;padding:2px 8px;border-radius:20px">✓ Saved</span>
      </div>

      <button type="submit" class="btn btn-primary btn-full">Login</button>
    </form>

    <p class="auth-switch">New student? <a href="{{ url_for('student_register') }}">Register here</a></p>
    <a href="{{ url_for('student_home') }}" class="auth-back">← Back</a>
  </div>
</div>

<script>
const STORAGE_KEY = 'ds_student_saved';
let allAccounts   = [];
let activeIdx     = -1;

function togglePw() {
  const inp = document.getElementById('password');
  const btn = document.getElementById('eyeBtn');
  inp.type  = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function buildDropdown(items) {
  const dd = document.getElementById('emailDropdown');
  dd.innerHTML = '';
  activeIdx = -1;
  if (!items.length) { dd.classList.remove('open'); return; }
  items.forEach((acc, i) => {
    const div = document.createElement('div');
    div.className = 'ac-item';
    div.dataset.email = acc.email;
    div.innerHTML = `
      <div class="ac-avatar">${acc.name[0].toUpperCase()}</div>
      <div>
        <div class="ac-email">${acc.email}</div>
        <div class="ac-name">${acc.name}</div>
      </div>`;
    div.addEventListener('mousedown', e => {
      e.preventDefault();
      selectAccount(acc.email);
    });
    dd.appendChild(div);
  });
  dd.classList.add('open');
}

function selectAccount(email) {
  const emailInput = document.getElementById('emailInput');
  const passwordInp = document.getElementById('password');
  emailInput.value = email;
  emailInput.style.borderColor = '#16a34a';
  document.getElementById('emailDropdown').classList.remove('open');

  // Auto-fill saved password for this email if exists
  const map = JSON.parse(localStorage.getItem(STORAGE_KEY + '_map') || '{}');
  if (map[email]) {
    passwordInp.type  = 'text';
    passwordInp.value = map[email];
    requestAnimationFrame(() => {
      passwordInp.type = 'password';
      passwordInp.style.borderColor = '#16a34a';
    });
  } else {
    passwordInp.value = '';
    passwordInp.style.borderColor = '';
    passwordInp.focus();
  }
}

function filterAccounts(query) {
  if (!query) return allAccounts;
  const q = query.toLowerCase();
  return allAccounts.filter(a =>
    a.email.toLowerCase().includes(q) || a.name.toLowerCase().includes(q)
  );
}

document.addEventListener('DOMContentLoaded', async () => {
  const emailInput  = document.getElementById('emailInput');
  const passwordInp = document.getElementById('password');
  const rememberChk = document.getElementById('rememberMe');
  const savedBadge  = document.getElementById('savedBadge');
  const dropdown    = document.getElementById('emailDropdown');
  const arrowBtn    = document.getElementById('emailArrow');

  // Fetch all registered student emails
  try {
    const res = await fetch('/api/student-emails');
    allAccounts = await res.json();
  } catch(e) { allAccounts = []; }

  // Pre-fill saved credentials
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
  if (saved && saved.email) {
    emailInput.value    = saved.email;
    rememberChk.checked = true;
    savedBadge.style.display = 'inline';
    emailInput.style.borderColor = '#16a34a';

    if (saved.password) {
      // Switch to text briefly so browser renders the filled value, then switch back
      passwordInp.type  = 'text';
      passwordInp.value = saved.password;
      requestAnimationFrame(() => {
        passwordInp.type = 'password';
        passwordInp.style.borderColor = '#16a34a';
      });
    }
  }

  // Arrow button — show all
  arrowBtn.addEventListener('click', e => {
    e.stopPropagation();
    if (dropdown.classList.contains('open')) {
      dropdown.classList.remove('open');
    } else {
      buildDropdown(allAccounts);
    }
  });

  // Filter on type
  emailInput.addEventListener('input', () => {
    emailInput.style.borderColor = '';
    buildDropdown(filterAccounts(emailInput.value));
  });

  emailInput.addEventListener('focus', () => {
    if (!emailInput.value) buildDropdown(allAccounts);
    else buildDropdown(filterAccounts(emailInput.value));
  });

  // Keyboard nav
  emailInput.addEventListener('keydown', e => {
    const items = dropdown.querySelectorAll('.ac-item');
    if (!items.length) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      activeIdx = Math.min(activeIdx + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
      items[activeIdx]?.scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      activeIdx = Math.max(activeIdx - 1, 0);
      items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
      items[activeIdx]?.scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'Enter' && activeIdx >= 0) {
      e.preventDefault();
      selectAccount(items[activeIdx].dataset.email);
    } else if (e.key === 'Escape') {
      dropdown.classList.remove('open');
    }
  });

  // Close on outside click
  document.addEventListener('click', e => {
    if (!e.target.closest('.ac-wrap')) dropdown.classList.remove('open');
  });

  passwordInp.addEventListener('input', () => passwordInp.style.borderColor = '');

  // Save on submit — store per-email map + last used
  document.getElementById('studentLoginForm').addEventListener('submit', () => {
    const email = emailInput.value;
    const pw    = passwordInp.value;
    if (rememberChk.checked && email && pw) {
      // Save a map of email -> password
      const map = JSON.parse(localStorage.getItem(STORAGE_KEY + '_map') || '{}');
      map[email] = pw;
      localStorage.setItem(STORAGE_KEY + '_map', JSON.stringify(map));
      // Also save last used
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ email, password: pw }));
    } else {
      localStorage.removeItem(STORAGE_KEY);
    }
  });
});
</script>
</body>
</html>
